<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RifaMax - Tu panel de rifas. Crea nuevas rifas y gestiona tus boletos.">
    <title>RifaMax — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container">
                <a href="dashboard.html" class="navbar-brand">
                    <div class="logo-icon">🎟️</div>
                    <span>Rifa<em>Max</em></span>
                </a>
                <ul class="navbar-nav">
                    <li><a href="dashboard.html" class="active">Inicio</a></li>
                    <li><a href="create-raffle.html">Crear Rifa</a></li>
                </ul>
                <div class="navbar-user">
                    <div class="user-avatar">?</div>
                    <span class="user-name">Usuario</span>
                    <button class="btn btn-logout" onclick="logout()">Salir</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container">
            <div class="page-header">
                <h1 id="welcome-title">¡Bienvenido!</h1>
                <p>Gestiona tus rifas y boletos desde aquí</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-created">0</div>
                    <div class="stat-label">Rifas Creadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-participating">0</div>
                    <div class="stat-label">Participando</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-tickets">0</div>
                    <div class="stat-label">Boletos Comprados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-won">0</div>
                    <div class="stat-label">Rifas Ganadas</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('created')">Mis Rifas</button>
                <button class="tab" onclick="switchTab('participating')">Participando</button>
                <button class="tab" onclick="switchTab('all')">Explorar</button>
            </div>

            <!-- Created Raffles -->
            <div id="tab-created" class="tab-content">
                <div class="section-title">
                    <h2>Mis Rifas</h2>
                    <a href="create-raffle.html" class="btn btn-primary btn-sm">+ Nueva Rifa</a>
                </div>
                <div id="my-raffles-grid" class="raffle-grid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Participating -->
            <div id="tab-participating" class="tab-content" style="display:none;">
                <div class="section-title">
                    <h2>Rifas en las que participo</h2>
                </div>
                <div id="participating-grid" class="raffle-grid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- All Raffles -->
            <div id="tab-all" class="tab-content" style="display:none;">
                <div class="section-title">
                    <h2>Explorar Rifas</h2>
                </div>
                <div id="all-raffles-grid" class="raffle-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
